name: deploy-docs

on:
  push:
    branches: [master]
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint OpenAPI specs
        run: npx --yes @redocly/cli lint --config .redocly.yaml docs-site/specs/user-service.yaml docs-site/specs/load-service.yaml docs-site/specs/bidding-service.yaml docs-site/specs/matching-service.yaml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

      - id: deployment
        uses: actions/deploy-pages@v4
