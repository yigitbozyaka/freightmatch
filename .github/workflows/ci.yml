name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run lint
        run: pnpm lint

      - name: Build User Service
        run: docker build ./services/user-service

      - name: Build Load Service
        run: docker build ./services/load-service

      - name: Build Bidding Service
        run: docker build ./services/bidding-service

      - name: Build Matching Service
        run: docker build ./services/matching-service