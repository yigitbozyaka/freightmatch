x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    command: ["--replSet", "rs0"]
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s
    logging: *default-logging

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s
    logging: *default-logging

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - user_uploads:/app/services/user-service/uploads
    environment:
      PORT: 3001
      MONGODB_URI: mongodb://mongodb:27017/freightmatch-users
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    logging: *default-logging

  load-service:
    build:
      context: .
      dockerfile: services/load-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 3002
      MONGODB_URI: mongodb://mongodb:27017/freightmatch-loads
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    logging: *default-logging

  bidding-service:
    build:
      context: .
      dockerfile: services/bidding-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 3003
      MONGODB_URI: mongodb://mongodb:27017/freightmatch-bidding
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOAD_SERVICE_URL: http://load-service:3002
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    logging: *default-logging

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    restart: unless-stopped
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      PORT: 3004
      MONGODB_URI: mongodb://mongodb:27017/freightmatch-matching
      KAFKA_BROKER: kafka:9092
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}
      USER_SERVICE_URL: http://user-service:3001
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET:?INTERNAL_SERVICE_SECRET is required}
    logging: *default-logging

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - user-service
      - load-service
      - bidding-service
      - matching-service
    logging: *default-logging

volumes:
  mongodb_data:
  user_uploads:
