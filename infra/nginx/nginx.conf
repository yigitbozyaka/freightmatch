worker_processes auto;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 10m;

    upstream user_service {
        server user-service:3001;
    }

    upstream load_service {
        server load-service:3002;
    }

    upstream bidding_service {
        server bidding-service:3003;
    }

    upstream matching_service {
        server matching-service:3004;
    }

    server {
        listen 80;

        location /api/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/carriers {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/loads {
            proxy_pass http://load_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/bids {
            proxy_pass http://bidding_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/match {
            proxy_pass http://matching_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
