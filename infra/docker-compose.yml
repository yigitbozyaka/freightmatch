services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["--replSet", "rs0"]
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --quiet
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 10s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../services/user-service/.env

  load-service:
    build:
      context: ..
      dockerfile: services/load-service/Dockerfile
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../services/load-service/.env

  bidding-service:
    build:
      context: ..
      dockerfile: services/bidding-service/Dockerfile
    ports:
      - "3003:3003"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../services/bidding-service/.env

  matching-service:
    build:
      context: ..
      dockerfile: services/matching-service/Dockerfile
    ports:
      - "3004:3004"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    env_file:
      - ../services/matching-service/.env

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - user-service
      - load-service
      - bidding-service
      - matching-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongodb_data:
